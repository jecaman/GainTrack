services:
  - type: web
    name: gaintrack-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ENV
        value: production
      - key: FORCE_HTTPS
        value: "true"
