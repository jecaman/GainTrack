<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Nuevos KPIs</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #00ff88;
        }
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
            margin-bottom: 20px;
        }
        .kpi-card {
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .kpi-card:hover {
            transform: translateY(-3px) scale(1.05);
            border-color: #00ff88;
            box-shadow: 0 8px 16px rgba(0, 255, 136, 0.2);
        }
        .kpi-label {
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }
        .kpi-value {
            font-size: 16px;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 3px;
        }
        .kpi-change {
            font-size: 10px;
            font-weight: 600;
        }
        .positive { color: #00ff88; }
        .negative { color: #ef4444; }
        .neutral { color: #a1a1aa; }
        .explanation {
            background: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            color: #a1a1aa;
            line-height: 1.4;
        }
        .highlight { color: #00ff88; font-weight: 600; }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">🎯 Nuevos KPIs Implementados</div>
        
        <div class="section-title">📊 KPIs Principales</div>
        <div class="kpi-row" id="main-kpis"></div>
        
        <div class="section-title">💎 Desglose de Ganancias</div>
        <div class="kpi-row" id="gains-kpis"></div>
        
        <button onclick="testWithRealData()" style="
            background: #00ff88;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin: 20px auto;
            display: block;
        ">🧪 Test con Datos Reales del Backend</button>
        
        <div id="backend-test" style="margin-top: 20px;"></div>
    </div>

    <script>
        // Datos de prueba (como los que vienen del backend)
        const mockData = {
            kpis: {
                total_invested: 1643.70,
                current_value: 1898.57,
                profit: 223.04,
                profit_percentage: 13.57,
                fees: 5.35,
                liquidity: 0,
                realized_gains: -31.83,
                unrealized_gains: 254.87,
                unrealized_percentage: 15.51
            }
        };

        function createKPICard(label, value, changePercent = null, isPositive = null) {
            let colorClass = 'neutral';
            if (isPositive !== null) {
                colorClass = isPositive ? 'positive' : 'negative';
            }

            return `
                <div class="kpi-card">
                    <div class="kpi-label">${label}</div>
                    <div class="kpi-value ${colorClass}">${value}</div>
                    ${changePercent ? `<div class="kpi-change ${colorClass}">${changePercent}</div>` : ''}
                </div>
            `;
        }

        function renderKPIs() {
            const kpis = mockData.kpis;
            
            // Todos los KPIs en una línea
            const allKPIs = [
                createKPICard('Portfolio Value', `${kpis.current_value.toFixed(2)}€`),
                createKPICard('Total Invested', `${kpis.total_invested.toFixed(2)}€`),
                createKPICard('Net Profit', 
                    `${kpis.profit >= 0 ? '+' : ''}${kpis.profit.toFixed(2)}€`, 
                    `${kpis.profit_percentage.toFixed(2)}%`,
                    kpis.profit >= 0
                ),
                createKPICard('Realized Gains', 
                    `${kpis.realized_gains >= 0 ? '+' : ''}${kpis.realized_gains.toFixed(2)}€`,
                    null,
                    kpis.realized_gains >= 0
                ),
                createKPICard('Unrealized Gains', 
                    `${kpis.unrealized_gains >= 0 ? '+' : ''}${kpis.unrealized_gains.toFixed(2)}€`,
                    `${kpis.unrealized_percentage.toFixed(2)}%`,
                    kpis.unrealized_gains >= 0
                ),
                createKPICard('Total Fees', `${kpis.fees.toFixed(2)}€`)
            ];
            
            document.getElementById('main-kpis').innerHTML = allKPIs.join('');
            
            // Limpiar la segunda fila ya no la usamos
            document.getElementById('gains-kpis').innerHTML = '';
            
            console.log('✅ Todos los KPIs en una línea');
        }

        async function testWithRealData() {
            const testDiv = document.getElementById('backend-test');
            testDiv.innerHTML = '<div style="text-align: center; color: #00ff88;">🔄 Obteniendo datos del backend...</div>';
            
            try {
                // Test del endpoint de salud
                const healthResponse = await fetch('http://localhost:8000/api/health');
                const healthData = await healthResponse.json();
                
                if (healthData.status === 'ok') {
                    testDiv.innerHTML = `
                        <div style="color: #00ff88; text-align: center;">
                            ✅ Backend conectado correctamente<br>
                            <small>${healthData.message}</small><br><br>
                            <em>Para ver los nuevos KPIs, sube un archivo CSV desde el frontend en http://localhost:5173</em>
                        </div>
                    `;
                } else {
                    throw new Error('Backend health check failed');
                }
            } catch (error) {
                testDiv.innerHTML = `
                    <div style="color: #ef4444; text-align: center;">
                        ❌ Error conectando al backend: ${error.message}<br>
                        <small>Asegúrate de que el backend esté corriendo en puerto 8000</small>
                    </div>
                `;
            }
        }

        // Renderizar KPIs al cargar
        renderKPIs();
    </script>
</body>
</html>
