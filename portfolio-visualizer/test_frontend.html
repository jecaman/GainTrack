<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test KPIs</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #000; color: #fff; }
        .kpi { border: 1px solid #333; padding: 15px; margin: 10px; border-radius: 8px; display: inline-block; min-width: 150px; }
        .positive { color: #00ff88; }
        .negative { color: #ff4444; }
        .title { font-size: 18px; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="title">🧪 Test de Nuevos KPIs</div>
    <div id="kpis">Cargando...</div>

    <script>
        async function testKPIs() {
            try {
                // Simular datos como los que envía el backend
                const mockData = {
                    kpis: {
                        total_invested: 1643.70,
                        current_value: 1898.57,
                        profit: 223.04,
                        profit_percentage: 13.57,
                        fees: 5.35,
                        liquidity: 0,
                        realized_gains: -31.83,
                        unrealized_gains: 254.87,
                        unrealized_percentage: 15.51
                    }
                };

                const kpis = mockData.kpis;
                
                const kpiContainer = document.getElementById('kpis');
                kpiContainer.innerHTML = `
                    <div class="kpi">
                        <strong>Portfolio Value</strong><br>
                        ${kpis.current_value.toFixed(2)}€
                    </div>
                    <div class="kpi">
                        <strong>Total Invested</strong><br>
                        ${kpis.total_invested.toFixed(2)}€
                    </div>
                    <div class="kpi">
                        <strong>Net Profit</strong><br>
                        <span class="${kpis.profit >= 0 ? 'positive' : 'negative'}">
                            ${kpis.profit >= 0 ? '+' : ''}${kpis.profit.toFixed(2)}€
                        </span><br>
                        <small>${kpis.profit_percentage.toFixed(2)}%</small>
                    </div>
                    <div class="kpi">
                        <strong>Total Fees</strong><br>
                        ${kpis.fees.toFixed(2)}€
                    </div>
                    <div class="kpi">
                        <strong>💎 Realized Gains</strong><br>
                        <span class="${kpis.realized_gains >= 0 ? 'positive' : 'negative'}">
                            ${kpis.realized_gains >= 0 ? '+' : ''}${kpis.realized_gains.toFixed(2)}€
                        </span>
                    </div>
                    <div class="kpi">
                        <strong>📈 Unrealized Gains</strong><br>
                        <span class="${kpis.unrealized_gains >= 0 ? 'positive' : 'negative'}">
                            ${kpis.unrealized_gains >= 0 ? '+' : ''}${kpis.unrealized_gains.toFixed(2)}€
                        </span><br>
                        <small>${kpis.unrealized_percentage.toFixed(2)}%</small>
                    </div>
                    <div class="kpi">
                        <strong>Liquidity</strong><br>
                        ${kpis.liquidity > 0 ? kpis.liquidity.toFixed(2) + '€' : 'N/A'}
                    </div>
                `;

                console.log('✅ KPIs cargados correctamente:', kpis);
                
            } catch (error) {
                console.error('❌ Error:', error);
                document.getElementById('kpis').innerHTML = `<div style="color: red;">Error: ${error.message}</div>`;
            }
        }

        // Ejecutar test
        testKPIs();
    </script>
</body>
</html>
